name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API — lint & type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt
      - run: pip install -r requirements.txt
      - run: pip install ruff mypy
      - name: Lint (ruff)
        run: ruff check .
      - name: Format check (ruff)
        run: ruff format --check .
      - name: Syntax check all Python files
        run: python -m compileall -q .

  cli:
    name: CLI — lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cli/package-lock.json
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build

  web:
    name: Web — lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  seed-tools:
    name: Seed tools — syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate all seed tool servers
        run: |
          for f in tools/*/server.py; do
            echo "Checking $f"
            python -m py_compile "$f"
          done
      - name: Validate all mcp.json manifests
        run: |
          for f in tools/*/mcp.json; do
            echo "Checking $f"
            python -c "import json; json.load(open('$f'))"
          done

  integrity:
    name: Integrity & security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: License file exists
        run: grep -q "GNU AFFERO GENERAL PUBLIC LICENSE" LICENSE
      - name: No secrets in source
        run: |
          ! grep -r "sk-ant-\|sk_live_\|AKIA\|BEGIN RSA\|BEGIN PRIVATE" \
            api/ cli/src/ web/app/ tools/ \
            --include="*.py" --include="*.ts" --include="*.tsx" \
            | grep -v ".example" | grep -v "node_modules"
      - name: No .env files committed
        run: |
          ! find . -name ".env" -not -name ".env.example" -not -path "*/node_modules/*" | grep -q "."
      - name: Copyright headers present
        run: |
          grep -q "Copyright.*Arhaan Girdhar" api/main.py
          grep -q "Copyright.*Arhaan Girdhar" cli/src/index.ts
